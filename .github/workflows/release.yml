name: Build and Release

on:
  push:
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        run: CGO_ENABLED=1 go build -o virtualgamepad ./src

      - name: Package
        run: |
          zip -j "virtualgamepad-${{ github.ref_name }}-darwin-arm64.zip" virtualgamepad config.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: virtualgamepad-*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        run: go build -o virtualgamepad.exe ./src
        env:
          CGO_ENABLED: 0

      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item virtualgamepad.exe, config.yaml dist/
          Compress-Archive -Path dist\* -DestinationPath "virtualgamepad-${{ github.ref_name }}-windows-amd64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: virtualgamepad-*.zip

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
